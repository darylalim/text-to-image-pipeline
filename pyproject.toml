[project]
name = "text-to-image-pipeline"
version = "0.1.0"
description = "Generate images from text prompts with FLUX.2 Klein and optional prompt enhancement via SmolLM2"
requires-python = ">=3.12"
dependencies = [
    "accelerate",
    "diffusers @ git+https://github.com/huggingface/diffusers.git",
    "streamlit",
    "python-dotenv",
    "sentencepiece",
    "torch",
    "transformers",
]

[dependency-groups]
dev = [
    "pytest",
    "ruff",
    "ty",
]
